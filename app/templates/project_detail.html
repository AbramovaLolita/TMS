{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1 id="project-title">Loading...</h1>
</div>

<!-- Project navigation cards -->
<div class="dashboard-cards">
    <div class="dashboard-card" onclick="location.href='/projects/{{ project_id }}/testcases'">
        <div class="dashboard-icon">📋</div>
        <h3>Test cases</h3>
        <p>Manage project test cases</p>
        <div class="dashboard-stats" id="testcases-count">Loading...</div>
    </div>

    <div class="dashboard-card" onclick="location.href='/projects/{{ project_id }}/testruns'">
        <div class="dashboard-icon">🔄</div>
        <h3>Test Runs</h3>
        <p>Run and manage test runs</p>
        <div class="dashboard-stats" id="testruns-count">Loading...</div>
    </div>
</div>

<!-- Brief information about recent test runs -->
<div class="recent-section">
    <h2>Recent Test Runs</h2>
    <div id="recent-testruns">
        Loading...
    </div>
</div>

<script>
    const projectId = {{ project_id }};

    function getToken() {
        return localStorage.getItem('access_token');
    }

    async function apiRequest(url) {
        const token = getToken();
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
            throw new Error('Unauthorized');
        }
        return response;
    }

    // Load project data
    async function loadProject() {
        try {
            const response = await apiRequest(`/api/projects/${projectId}`);
            const project = await response.json();
            document.getElementById('project-title').textContent = project.title;
        } catch (error) {
            console.error('Error loading project:', error);
        }
    }

    // Load test cases count
    async function loadTestcasesCount() {
        try {
            const response = await apiRequest(`/api/projects/${projectId}/testcases`);
            const testcases = await response.json();
            document.getElementById('testcases-count').innerHTML = `${testcases.length} pcs.`;
        } catch (error) {
            document.getElementById('testcases-count').innerHTML = 'Error';
        }
    }

    // Load test runs count
    async function loadTestrunsCount() {
        try {
            const response = await apiRequest(`/api/projects/${projectId}/testruns`);
            const testruns = await response.json();
            document.getElementById('testruns-count').innerHTML = `${testruns.length} pcs.`;
        } catch (error) {
            document.getElementById('testruns-count').innerHTML = 'Error';
        }
    }

    // Load last 3 test runs
    async function loadRecentTestruns() {
        try {
            const response = await apiRequest(`/api/projects/${projectId}/testruns`);
            const testruns = await response.json();
            const recent = testruns.slice(-3).reverse();

            const container = document.getElementById('recent-testruns');
            if (recent.length === 0) {
                container.innerHTML = '<div class="empty-state">No test runs. Create the first one!</div>';
                return;
            }

            container.innerHTML = recent.map(tr => `
                <div class="recent-card" onclick="location.href='/testruns/${tr.id}'">
                    <div class="recent-info">
                        <strong>${escapeHtml(tr.title)}</strong>
                        <span class="status status-${tr.status}">${tr.status}</span>
                    </div>
                    <div class="recent-date">
                        ${tr.created_at ? new Date(tr.created_at).toLocaleDateString() : '—'}
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading recent testruns:', error);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Start all data loading
    loadProject();
    loadTestcasesCount();
    loadTestrunsCount();
    loadRecentTestruns();
</script>

<style>
    .dashboard-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin: 30px 0;
    }
    
    .dashboard-card {
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 25px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .dashboard-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        border-color: #ccc;
    }
    
    .dashboard-icon {
        font-size: 48px;
        margin-bottom: 15px;
    }
    
    .dashboard-card h3 {
        margin-bottom: 10px;
        color: #2c3e50;
    }
    
    .dashboard-card p {
        color: #666;
        font-size: 14px;
        margin-bottom: 15px;
    }
    
    .dashboard-stats {
        font-size: 24px;
        font-weight: bold;
        color: #3498db;
    }
    
    .recent-section {
        margin-top: 40px;
    }
    
    .recent-section h2 {
        margin-bottom: 20px;
        font-size: 20px;
        color: #2c3e50;
    }
    
    .recent-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 15px 20px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: background 0.2s;
    }
    
    .recent-card:hover {
        background: #f8f9fa;
    }
    
    .recent-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }
    
    .status-pending {
        background: #f0f0f0;
        color: #666;
    }
    
    .status-running {
        background: #3498db;
        color: white;
    }
    
    .status-completed {
        background: #27ae60;
        color: white;
    }
    
    .recent-date {
        color: #888;
        font-size: 14px;
    }
</style>
{% endblock %}
