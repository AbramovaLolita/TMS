<!-- app/templates/users.html -->
{% extends "base.html" %}

{% block title %}Manage users - TMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Users</h1>
</div>

<div id="users-list" class="users-list">
    Загрузка...
</div>

<!-- Модальное окно редактирования пользователя -->
<div id="editModal" class="modal" style="display:none">
    <div class="modal-content">
        <h3>Edit user card</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label>Login</label>
            <input type="text" id="editUsername" placeholder="Enter your login">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="editEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label>New password (if necessary)</label>
            <input type="password" id="editPassword" placeholder="New password">
        </div>
        <div class="modal-buttons">
            <button onclick="updateUser()" class="btn btn-primary">Save</button>
            <button onclick="closeEditModal()" class="btn btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<script>
    async function loadUsers() {
        try {
            const response = await apiRequest('/api/users/');
            const users = await response.json();

            const container = document.getElementById('users-list');
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state">No users</div>';
                return;
            }

            container.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="user-info">
                        <div class="user-avatar">${getAvatar(user.username)}</div>
                        <div class="user-details">
                            <h3>${escapeHtml(user.username)}</h3>
                            <p>${escapeHtml(user.email || 'Email не указан')}</p>
                            <p class="user-id">ID: ${user.id}</p>
                        </div>
                    </div>
                    <div class="user-actions">
                        <button class="btn-icon" onclick="editUser(${user.id})">✏️</button>
                        <button class="btn-icon btn-danger" onclick="deleteUser(${user.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading users:', error);
            document.getElementById('users-list').innerHTML = '<div class="empty-state">Users Load Error</div>';
        }
    }

    function getAvatar(username) {
        const firstChar = username.charAt(0).toUpperCase();
        return `<div class="avatar">${firstChar}</div>`;
    }

    async function createUser() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            alert('Enter login and password');
            return;
        }

        const data = {
            username: username,
            password: password,
            email: document.getElementById('email').value || null
        };

        try {
            const response = await apiRequest('/api/users/', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeModal();
                loadUsers();
            } else {
                const error = await response.json();
                alert(error.detail || 'User creation error');
            }
        } catch (error) {
            alert('Ошибка соединения');
        }
    }

    async function editUser(id) {
        try {
            const response = await apiRequest(`/api/users/${id}`);
            const user = await response.json();

            document.getElementById('editId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPassword').value = '';

            document.getElementById('editModal').style.display = 'flex';
        } catch (error) {
            alert('User Load Error');
        }
    }

    async function updateUser() {
        const id = document.getElementById('editId').value;
        const data = {
            username: document.getElementById('editUsername').value.trim(),
            email: document.getElementById('editEmail').value || null
        };

        const password = document.getElementById('editPassword').value;
        if (password) {
            data.password = password;
        }

        if (!data.username) {
            alert('Имя пользователя не может быть пустым');
            return;
        }

        try {
            const response = await apiRequest(`/api/users/${id}`, {
                method: 'PUT',
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeEditModal();
                loadUsers();
            } else {
                const error = await response.json();
                alert(error.detail || 'Ошибка обновления пользователя');
            }
        } catch (error) {
            alert('Ошибка соединения');
        }
    }

    async function deleteUser(id) {
        if (confirm('Are you sure you want to delete this user? All their projects will also be deleted.')) {
            try {
                const response = await apiRequest(`/api/users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadUsers();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Error deleting user');
                }
            } catch (error) {
                alert('Connection error');
            }
        }
    }

    function showCreateModal() {
        document.getElementById('createModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('createModal').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('editId').value = '';
        document.getElementById('editUsername').value = '';
        document.getElementById('editEmail').value = '';
        document.getElementById('editPassword').value = '';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Загружаем пользователей при загрузке страницы
    loadUsers();
</script>

<style>
    .users-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .user-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px 20px;
        transition: box-shadow 0.2s;
    }

    .user-card:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .avatar {
        width: 50px;
        height: 50px;
        background: #3498db;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: bold;
    }

    .user-details h3 {
        margin: 0 0 5px 0;
        font-size: 18px;
        color: #2c3e50;
    }

    .user-details p {
        margin: 3px 0;
        color: #666;
        font-size: 14px;
    }

    .user-id {
        font-size: 12px;
        color: #999;
    }

    .user-actions {
        display: flex;
        gap: 10px;
    }

    .btn-icon {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        padding: 8px;
        border-radius: 4px;
        transition: background 0.2s;
    }

    .btn-icon:hover {
        background: #f0f0f0;
    }

    .btn-danger {
        color: #e74c3c;
    }

    .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
    }
</style>
{% endblock %}
