<!-- app/templates/statuses.html -->
{% extends "base.html" %}

{% block title %}Manage statuses - TMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Test statuses</h1>
    <button class="btn btn-primary" onclick="showCreateModal()">+ New status</button>
</div>

<div id="statuses-list" class="statuses-list">
    Loading...
</div>

<!-- Модальное окно создания статуса -->
<div id="createModal" class="modal" style="display:none">
    <div class="modal-content">
        <h3>Create status</h3>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="statusName" placeholder="например: in_progress, blocked">
        </div>
        <div class="modal-buttons">
            <button onclick="createStatus()" class="btn btn-primary">Создать</button>
            <button onclick="closeModal()" class="btn btn-secondary">Отмена</button>
        </div>
    </div>
</div>

<script>
    async function loadStatuses() {
        const response = await apiRequest('/api/statuses/');
        const statuses = await response.json();
        
        const container = document.getElementById('statuses-list');
        
        const defaultStatuses = statuses.filter(s => [1, 2, 3, 4].includes(s.id));
        const customStatuses = statuses.filter(s => ![1, 2, 3, 4].includes(s.id));
        
        container.innerHTML = `
            <div class="status-section">
                <h3>Системные статусы (нельзя удалить)</h3>
                <div class="status-cards">
                    ${defaultStatuses.map(s => `
                        <div class="status-card default">
                            <span class="status-name">${getStatusIcon(s.name)} ${escapeHtml(s.name)}</span>
                            <span class="status-badge">Системный</span>
                        </div>
                    `).join('')}
                </div>
            </div>
            <div class="status-section">
                <h3>Пользовательские статусы</h3>
                <div class="status-cards">
                    ${customStatuses.length === 0 ? '<div class="empty-state">Нет пользовательских статусов. Создайте первый!</div>' : 
                        customStatuses.map(s => `
                            <div class="status-card">
                                <span class="status-name">${escapeHtml(s.name)}</span>
                                <button class="btn-delete-status" onclick="deleteStatus(${s.id})">🗑️ Удалить</button>
                            </div>
                        `).join('')}
                </div>
            </div>
        `;
    }
    
    function getStatusIcon(name) {
        const icons = {
            'passed': '✅',
            'failed': '❌',
            'skipped': '⏭️',
            'pending': '⏳'
        };
        return icons[name] || '📌';
    }
    
    async function createStatus() {
        const name = document.getElementById('statusName').value;
        if (!name) {
            alert('Введите название статуса');
            return;
        }
        
        const response = await apiRequest('/api/statuses/', {
            method: 'POST',
            body: JSON.stringify({ name: name })
        });
        
        if (response.ok) {
            closeModal();
            loadStatuses();
        } else {
            alert('Ошибка создания статуса');
        }
    }
    
    async function deleteStatus(id) {
        if (confirm('Вы уверены, что хотите удалить этот статус?')) {
            const response = await apiRequest(`/api/statuses/${id}`, { method: 'DELETE' });
            if (response.ok) {
                loadStatuses();
            } else {
                const error = await response.json();
                alert(error.detail || 'Ошибка удаления статуса');
            }
        }
    }
    
    function showCreateModal() {
        document.getElementById('createModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('createModal').style.display = 'none';
        document.getElementById('statusName').value = '';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadStatuses();
</script>

<style>
    .statuses-list {
        display: flex;
        flex-direction: column;
        gap: 30px;
    }
    .status-section h3 {
        margin-bottom: 15px;
        color: #2c3e50;
    }
    .status-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
    }
    .status-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
    }
    .status-card.default {
        background: #f8f9fa;
    }
    .status-name {
        font-size: 16px;
        font-weight: 500;
    }
    .status-badge {
        font-size: 12px;
        padding: 4px 8px;
        background: #e0e0e0;
        border-radius: 4px;
        color: #666;
    }
    .btn-delete-status {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
    }
</style>
{% endblock %}
